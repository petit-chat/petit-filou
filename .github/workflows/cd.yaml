name: Continuous Deployment

on:
  release:
    types: [published]

jobs:
  build-and-push-docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v1
        with:
            registry: ghcr.io
            username: ${{github.actor}}
            password: ${{secrets.GITHUB_TOKEN}}

      - name: Build and Push Docker Image
        run: |
          docker build . --tag ghcr.io/petit-chat/pf:${{ github.event.release.tag_name }}
          docker push ghcr.io/petit-chat/pf:${{ github.event.release.tag_name }}

  build-and-release-binaries:
    name: Build for Multiple Targets
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
          - os: ubuntu-latest
            target: i686-unknown-linux-musl
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: windows-latest
            target: i686-pc-windows-msvc
          - os: windows-latest
            target: x86_64-pc-windows-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
      fail-fast: false
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
            
      - name: Build and Upload Assets
        uses: taiki-e/upload-rust-binary-action@main
        with:
          archive: $bin-$tag#$target
          bin: pf
          checksum: sha256
          include: README.md,CHANGELOG.md,LICENSE
          leading-dir: true
          ref: refs/tags/${{ github.event.release.tag_name }}
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
